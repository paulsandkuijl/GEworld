<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ground Effect World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        appleGray: '#F5F5F7',
                        appleDark: '#1D1D1F',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.appleGray');
            color: theme('colors.appleDark');
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .hidden { display: none !important; }
        #crawlStatus { transition: all 0.3s ease; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        .crawl-panel {
            background: linear-gradient(135deg, rgba(0,122,255,0.06), rgba(88,86,214,0.06));
            border: 1px solid rgba(0,122,255,0.15);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
        }
        /* Autocomplete dropdown */
        #craftNameWrapper { position: relative; flex: none; }
        #craftNameDropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.10);
            overflow: hidden;
            z-index: 50;
            max-height: 220px;
            overflow-y: auto;
        }
        #craftNameDropdown .ac-item {
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.12s;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #craftNameDropdown .ac-item:last-child { border-bottom: none; }
        #craftNameDropdown .ac-item:hover,
        #craftNameDropdown .ac-item.active { background: #EFF6FF; color: #1d4ed8; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-semibold tracking-tight text-appleDark mb-2 cursor-pointer" onclick="showListView()">Ground Effect World</h1>
                <p class="text-gray-500 font-light">The definitive database of ground effect craft.</p>
            </div>
        </header>

        <!-- LIST VIEW -->
        <div id="listView">
            <!-- Manual URL Ingestion Panel -->
            <div class="crawl-panel mb-8">
                <div class="flex items-center gap-2 mb-3">
                    <svg class="h-4 w-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>
                    <span class="text-sm font-semibold text-blue-700 uppercase tracking-widest">Manual Ingestion</span>
                </div>
                <p class="text-xs text-gray-500 mb-3">Paste any webpage URL — Wikipedia articles, news reports, manufacturer pages, aviation databases, or forum posts — to extract and add or update a craft in the database.</p>
                <div class="flex gap-2 flex-col sm:flex-row" style="align-items:flex-start">
                    <!-- Craft name with live autocomplete -->
                    <div id="craftNameWrapper" class="sm:w-48">
                        <input type="text" id="craftNameInput" placeholder="Craft name (e.g. Spasatel)" 
                            class="w-full px-3 py-2 rounded-xl border border-gray-200 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-400"
                            oninput="onCraftNameInput()" onkeydown="onCraftNameKeydown(event)" autocomplete="off">
                        <div id="craftNameDropdown" class="hidden"></div>
                    </div>
                    <input type="url" id="crawlUrlInput" placeholder="Optional: paste a specific URL to override auto-search" 
                        class="flex-1 px-3 py-2 rounded-xl border border-gray-200 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-400"
                        oninput="updateCrawlBtn()">
                    <button id="crawlBtn" onclick="submitCrawlUrl()" 
                        class="px-4 py-2 rounded-xl bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 active:scale-95 transition-all flex items-center gap-2 whitespace-nowrap">
                        <svg id="crawlIcon" class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                        <span id="crawlBtnText">Auto-Search & Extract</span>
                    </button>
                </div>
                <div id="crawlStatus" class="hidden mt-3 text-sm"></div>
            </div>

            <div class="mb-8 relative max-w-md">
                <svg class="absolute left-3 top-3 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search craft..." class="w-full pl-10 pr-4 py-2 rounded-full border-none shadow-sm focus:ring-2 focus:ring-blue-500 bg-white placeholder-gray-400 outline-none transition-all">
            </div>

            <div id="craftsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading skeleton -->
                <div class="glass-card p-6 min-h-[150px] animate-pulse">
                    <div class="h-4 bg-gray-200 rounded w-3/4 mb-4"></div>
                    <div class="h-3 bg-gray-200 rounded w-1/2 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-5/6"></div>
                </div>
            </div>
        </div>

        <!-- DETAIL VIEW -->
        <div id="detailView" class="hidden animate-fade-in">
            <button onclick="showListView()" class="mb-6 text-blue-500 hover:text-blue-700 font-medium flex items-center transition-colors">
                <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                Back to List
            </button>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        // Data and navigation logic
        let currentCrafts = [];

        async function fetchCrafts(query = '') {
            try {
                let url = '/api/crafts';
                if (query) {
                    url += `?search=${encodeURIComponent(query)}`;
                }
                const response = await fetch(url);
                const crafts = await response.json();
                renderCrafts(crafts);
            } catch (error) {
                console.error("Failed to load crafts", error);
            }
        }

        async function showCraftDetails(craftId) {
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('detailContent').innerHTML = '<p class="text-gray-500">Loading details...</p>';
            
            try {
                const response = await fetch('/api/crafts/' + craftId);
                const craft = await response.json();
                renderDetailView(craft);
            } catch (error) {
                console.error("Failed to fetch craft details", error);
                document.getElementById('detailContent').innerHTML = '<p class="text-red-500">Failed to load detail data.</p>';
            }
        }

        function showListView() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('listView').classList.remove('hidden');
        }

        function renderCrafts(crafts) {
            const grid = document.getElementById('craftsGrid');
            grid.innerHTML = '';
            
            if (crafts.length === 0) {
                grid.innerHTML = '<p class="text-gray-500">No craft found.</p>';
                return;
            }

            crafts.forEach(craft => {
                const statusColor = craft.status && craft.status.toLowerCase().includes('active') ? 'text-green-600 bg-green-50' : 'text-gray-600 bg-gray-100';
                const statusBadge = craft.status ? `<span class="px-2 py-1 text-[10px] font-medium uppercase tracking-wider rounded-full ${statusColor}">${craft.status}</span>` : '';
                
                // Use Wikipedia-sourced or user-provided image
                const primaryImage = craft.media && craft.media.length > 0 ? craft.media[0].url : 'https://placehold.co/600x400/EDEDF0/9ca3af?text=Image+Pending';

                const card = document.createElement('div');
                // Use overflow-hidden to crop the image nicely inside the rounded card
                card.className = 'glass-card flex flex-col hover:-translate-y-1 transition-transform duration-300 cursor-pointer overflow-hidden';
                card.onclick = () => showCraftDetails(craft.id);
                card.innerHTML = `
                    <div class="h-44 w-full bg-gray-200">
                        <img src="${primaryImage}" alt="${craft.name}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-5 flex flex-col justify-between flex-1">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h2 class="text-lg font-semibold text-appleDark leading-tight">${craft.name}</h2>
                            </div>
                            <p class="text-sm text-gray-500 mb-3">${craft.country_of_origin || 'Unknown origin'} • ${craft.year_introduced || 'Unknown era'}</p>
                            ${statusBadge}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderDetailView(craft) {
            // Pick primary image or just the first image
            const primaryImage = craft.media && craft.media.length > 0 ? craft.media[0].url : null;
            const imgHTML = primaryImage 
                ? `<img src="${primaryImage}" alt="${craft.name}" class="w-full h-80 object-cover rounded-xl mb-8 shadow-md">`
                : `<div class="w-full h-40 bg-gray-200 rounded-xl mb-8 flex items-center justify-center text-gray-400">No image available</div>`;

            // Spec helpers
            const specHTML = (label, value) => value ? `
                <div class="py-3 border-b border-gray-100 flex justify-between">
                    <span class="text-gray-500">${label}</span>
                    <span class="font-medium text-appleDark text-right">${value}</span>
                </div>` : '';

            const s = craft.specifications || {};
            
            // Generate engine text
            const enginesHTML = craft.engines && craft.engines.length > 0 
                ? craft.engines.map(e => `${e.quantity}x ${e.engine_name} ${e.type || ''}`).join(', ')
                : '';

            document.getElementById('detailContent').innerHTML = `
                ${imgHTML}
                
                <div class="flex items-center space-x-3 mb-2">
                    <h2 class="text-3xl font-semibold">${craft.name}</h2>
                    ${craft.status ? `<span class="px-3 py-1 text-sm font-medium rounded-full bg-gray-200">${craft.status}</span>` : ''}
                </div>
                <p class="text-lg text-gray-500 mb-8">${craft.designer || craft.manufacturer || 'Unknown Builder'} • ${craft.country_of_origin || 'Unknown Country'} • ${craft.year_introduced || craft.operational_era || 'Unknown Era'}</p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <!-- Left Column: History & Details -->
                    <div>
                        <h3 class="text-xl font-medium mb-4">Overview & History</h3>
                        <p class="text-gray-700 leading-relaxed mb-6">${craft.description_history || 'No history available.'}</p>
                        
                        ${craft.operational_history ? `
                        <h4 class="font-medium mb-2">Operational History</h4>
                        <p class="text-gray-700 leading-relaxed text-sm mb-6">${craft.operational_history}</p>
                        ` : ''}

                        ${craft.known_accidents ? `
                        <h4 class="font-medium mb-2 text-red-800">Accidents & Incidents</h4>
                        <p class="text-red-700 leading-relaxed text-sm mb-6">${craft.known_accidents}</p>
                        ` : ''}
                    </div>

                    <!-- Right Column: Specs -->
                    <div class="glass-card p-6">
                        <h3 class="text-xl font-medium mb-4">Technical Specifications</h3>
                        
                        ${specHTML('Class Type', craft.craft_type)}
                        ${specHTML('Length', s.length_m ? s.length_m + ' m' : null)}
                        ${specHTML('Wingspan', s.wingspan_m ? s.wingspan_m + ' m' : null)}
                        ${specHTML('Height', s.height_m ? s.height_m + ' m' : null)}
                        ${specHTML('Max Takeoff Weight', s.max_takeoff_weight_kg ? s.max_takeoff_weight_kg.toLocaleString() + ' kg' : null)}
                        ${specHTML('Max Speed', s.max_speed_kmh ? s.max_speed_kmh + ' km/h' : null)}
                        ${specHTML('Cruise Speed', s.cruise_speed_kmh ? s.cruise_speed_kmh + ' km/h' : null)}
                        ${specHTML('Range', s.range_km ? s.range_km.toLocaleString() + ' km' : null)}
                        ${specHTML('Ground Effect Alt', s.ground_effect_altitude_m ? s.ground_effect_altitude_m + ' m' : null)}
                        ${specHTML('Engines', enginesHTML)}
                        
                        ${craft.current_location ? `<div class="mt-6 pt-4 border-t border-gray-100 text-sm"><span class="text-gray-500">Current Location:</span> ${craft.current_location}</div>` : ''}
                    </div>
                </div>
            `;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            fetchCrafts(e.target.value);
        });

        // ── Live Autocomplete for Craft Name Input ───────────────────────────────
        let acDebounceTimer = null;
        let acActiveIndex = -1;
        let acResults = [];

        async function onCraftNameInput() {
            updateCrawlBtn();
            const q = document.getElementById('craftNameInput').value.trim();
            const dropdown = document.getElementById('craftNameDropdown');

            if (q.length < 2) {
                closeDropdown();
                return;
            }

            // Debounce — wait 200ms after the user stops typing
            clearTimeout(acDebounceTimer);
            acDebounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/crafts?search=${encodeURIComponent(q)}&limit=8`);
                    acResults = await res.json();

                    if (acResults.length === 0) {
                        closeDropdown();
                        return;
                    }

                    acActiveIndex = -1;
                    dropdown.innerHTML = acResults.map((c, i) => {
                        // Bold the matching substring
                        const rx = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                        const highlighted = c.name.replace(rx, '<strong>$1</strong>');
                        const meta = [c.country_of_origin, c.year_introduced].filter(Boolean).join(' · ');
                        return `<div class="ac-item" data-idx="${i}" onmousedown="selectAcItem(${i})">
                            <span>${highlighted}</span>
                            ${meta ? `<span class="ml-2 text-gray-400 text-[11px]">${meta}</span>` : ''}
                        </div>`;
                    }).join('');

                    dropdown.classList.remove('hidden');
                } catch (e) { /* fail silently */ }
            }, 200);
        }

        function selectAcItem(idx) {
            const craft = acResults[idx];
            if (!craft) return;
            document.getElementById('craftNameInput').value = craft.name;
            closeDropdown();
            updateCrawlBtn();
        }

        function closeDropdown() {
            document.getElementById('craftNameDropdown').classList.add('hidden');
            acActiveIndex = -1;
        }

        function onCraftNameKeydown(e) {
            const dropdown = document.getElementById('craftNameDropdown');
            const items = dropdown.querySelectorAll('.ac-item');

            if (dropdown.classList.contains('hidden')) {
                if (e.key === 'Enter') submitCrawlUrl();
                return;
            }

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                acActiveIndex = Math.min(acActiveIndex + 1, items.length - 1);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                acActiveIndex = Math.max(acActiveIndex - 1, -1);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (acActiveIndex >= 0) {
                    selectAcItem(acActiveIndex);
                } else {
                    closeDropdown();
                    submitCrawlUrl();
                }
                return;
            } else if (e.key === 'Escape') {
                closeDropdown();
                return;
            }

            // Highlight active item
            items.forEach((el, i) => el.classList.toggle('active', i === acActiveIndex));
            if (acActiveIndex >= 0) items[acActiveIndex].scrollIntoView({ block: 'nearest' });
        }

        // Close dropdown when clicking anywhere outside
        document.addEventListener('mousedown', (e) => {
            if (!document.getElementById('craftNameWrapper').contains(e.target)) {
                closeDropdown();
            }
        });

        function updateCrawlBtn() {
            const hasUrl = document.getElementById('crawlUrlInput').value.trim();
            const hasName = document.getElementById('craftNameInput').value.trim();
            const btnText = document.getElementById('crawlBtnText');
            if (hasUrl) {
                btnText.textContent = 'Scan URL & Extract';
            } else if (hasName) {
                btnText.textContent = 'Auto-Search & Extract';
            } else {
                btnText.textContent = 'Scan & Extract';
            }
        }

        async function submitCrawlUrl() {
            const url = document.getElementById('crawlUrlInput').value.trim();
            const craftName = document.getElementById('craftNameInput').value.trim();
            const statusEl = document.getElementById('crawlStatus');
            const btn = document.getElementById('crawlBtn');
            const icon = document.getElementById('crawlIcon');

            if (!url && !craftName) {
                statusEl.className = 'mt-3 text-sm text-red-600';
                statusEl.textContent = 'Please enter a craft name or URL (or both).';
                return;
            }

            // Lock UI
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            icon.classList.add('spinner');
            document.getElementById('crawlBtnText').textContent = 'Extracting...';
            statusEl.className = 'mt-3 text-sm text-blue-600 transition-opacity duration-300';
            statusEl.style.opacity = '1';
            statusEl.textContent = 'Connecting...';

            const setLine = (msg, cls = 'text-blue-600') => {
                statusEl.style.opacity = '0';
                setTimeout(() => {
                    statusEl.className = 'mt-3 text-sm ' + cls + ' transition-opacity duration-300';
                    statusEl.textContent = msg;
                    statusEl.style.opacity = '1';
                }, 150);
            };

            try {
                const res = await fetch('/api/crawl-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url || null, craft_name: craftName || null })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let doneData = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    const parts = buffer.split('\n\n');
                    buffer = parts.pop();

                    for (const part of parts) {
                        const line = part.replace(/^data:\s*/, '').trim();
                        if (!line) continue;
                        try {
                            const evt = JSON.parse(line);
                            if (evt.type === 'error') {
                                setLine(evt.message, 'text-red-600');
                            } else if (evt.type === 'done') {
                                doneData = evt;
                                setLine(evt.message, 'text-green-600');
                            } else {
                                setLine(evt.message, 'text-blue-600');
                            }
                        } catch (_) {}
                    }
                }

                if (doneData) {
                    setTimeout(async () => {
                        await fetchCrafts();
                        showCraftDetails(doneData.craft_id);
                        document.getElementById('crawlUrlInput').value = '';
                        document.getElementById('craftNameInput').value = '';
                        updateCrawlBtn();
                    }, 1500);
                }

            } catch (err) {
                setLine('Network error: ' + err.message, 'text-red-600');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                icon.classList.remove('spinner');
                updateCrawlBtn();
            }
        }

        // Allow Enter key in URL field to trigger crawl
        document.getElementById('crawlUrlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitCrawlUrl();
        });
        document.getElementById('craftNameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitCrawlUrl();
        });

        // Initial fetch
        fetchCrafts();
    </script>
</body>
</html>
